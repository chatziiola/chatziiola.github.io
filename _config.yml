title: "Simple Man's Journey"
description: "Personal Blog on Informatics"
tagline: "Μια ιστοσελίδα φτιαγμένη για την προσφορά ποιοτικού περιεχομένου στην πληροφορική και την ασφάλεια δικτύων στα ελληνικά."

url: "https://chatziiola.github.io"
source: .
destination: ./_site

locale: "en-US"
timezone: Europe/Athens
date_format: "%d-%m-%Y"

skin: "/assets/css/skins/light.css"
  # just remember than we can use it to our advantage -> create our own color skin -> w zoe
logo: "/images/site-logo.png"
remote_theme: "mmistakes/so-simple-theme"

search: true
future: true
category_archive_path: "/categories/#"                      
mathjax: false
# TODO -> aesthetically appealing comment section
read_time: false
words_per_minute: 200
comments: false

permalink: date
highlighter: rouge
markdown: GFM

defaults:
  # Posts defaults
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true

author:
    name: "Lamprinos Chatziioannou"
    email: "lampischatziioannou@gmail.com"
    picture: "images/author.png"
    twitter: "@chatziiola"
    links:
        - title: GitHub
          url: https://github.com/chatziiola
          icon: fab fa-github
        - title: Twitter
          url: https://twitter.com/chatziiola
          icon: fab fa-twitter-square
        - title: Instagram
          url: https://instagram.com/chatziio.zs
          icon: fab fa-instagram
       # - title: StackExchange
       #   url: 
       #   icon: fab fa-stack-exchange
       
footer_links:
        - title: GitHub
          url: https://github.com/chatziiola
          icon: fab fa-github
        - title: Twitter
          url: https://twitter.com/chatziiola
          icon: fab fa-twitter-square
        - title: Instagram
          url: https://instagram.com/oxi_esy_lampeis_mpampi_mou
          icon: fab fa-instagram
        - title: Feed
          url: atom.xml
          icon: fas fa-rss-square
   
google_fonts:
  - name: "Roboto"
    weights: "300,300i,700,700i"
  - name: "Roboto Mono"
    weights: "300,300i,700,700i"

plugins:
    - jekyll-seo-tag
    - jekyll-feed
