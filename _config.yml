remote_theme: "mmistakes/so-simple-theme"


title						: "Simple Man"
description					: "Personal blog."
logo						: #null

locale						: "el-GR"
timezone					: Europe/Athens
date_format					: "%B %-d, %Y"
future 						: true

url						: "https://chatziiola.github.io" 
baseurl						: #"/test/"
source						: .
destination					: ./_site

markdown          : kramdown
# Pagination - https://jekyllrb.com/docs/pagination/
paginate				: 10
paginate_path				: /page:num/

plugins:
  - jekyll-paginate
whitelist:
  - jekyll-paginate

defaults:
  # Post defaults
  - scope:
      path	: "_posts"
      type	: posts
    values	:
      layout	: post
      comments	: true
      share	: true
 
# Site Author
author:
