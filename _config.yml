title: "Simple Man's Journey"
description: "Personal Blog on Informatics"

url: "https://chatziiola.github.io"
source: .
destination: ./_site

locale: "en-US"
timezone: Europe/Athens
date_format: "%d-%m-%Y"

skin: "/assets/css/skins/mine.css"
logo: "/images/site/site-logo.png"
category_archive_path: "/categories/#"                    
tag_archive_path: "/tags/#"
remote_theme: "mmistakes/so-simple-theme"

search: true
future: false
mathjax: false
read_time: false
words_per_minute: 200
comments: false
# TODO -> https://github.com/wireddown/ghpages-ghcomments

permalink: date
highlighter: rouge
markdown: Kramdown

collections:
    greek:
          output: true
          permalink: /:collection/:path/


defaults:
  # Posts defaults
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      share: true
      
feed:
  path: atom.xml

author:
    name: "Lamprinos Chatziioannou"
    email: "lampischatziioannou@gmail.com"
    picture: "images/site/author.png"
    links:
        - title: GitHub
          url: https://github.com/chatziiola
          icon: fab fa-github
        - title: Twitter
          url: https://twitter.com/chatziiola
          icon: fab fa-twitter-square
        - title: Instagram
          url: https://instagram.com/simplemansjourney
          icon: fab fa-instagram
        - title: Dev.to
          url: https://dev.to/chatziiola
          icon: fab fa-dev
        - title: Feed
          url: atom.xml
          icon: fas fa-rss-square
       
   
google_fonts:
  - name: "Source Sans Pro"
    weights: "200,200i,300,300i"
  - name: "IBM Plex Mono"
    weights: "300,400,500,600"

plugins:
    - jekyll-seo-tag
    - jekyll-feed
